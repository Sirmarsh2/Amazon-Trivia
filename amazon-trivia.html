<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Trivia Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            color: #c61200;
        }
        .question {
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .options {
            list-style: none;
            padding: 0;
        }
        .options li {
            margin: 10px 0;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            border: none;
            background: #c61200;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Amazon Trivia Quiz</h1>
        <div class="question">
            <h2>Question 1: When was Amazon founded?</h2>
            <ul class="options">
                <li><input type="radio" name="q1" value="1994"> 1994</li>
                <li><input type="radio" name="q1" value="1996"> 1996</li>
                <li><input type="radio" name="q1" value="2000"> 2000</li>
                <li><input type="radio" name="q1" value="2004"> 2004</li>
            </ul>
        </div>
        <button id="submitBtn">Submit</button>
    </div>
    <script>
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.addEventListener('click', () => {
            const answer = document.querySelector('input[name="q1"]:checked');
            if (answer) {
                const response = { 
                    answer: answer.value
                };
                // Here you would typically send the response to Google Forms or handle it as needed
                console.log('Response submitted:', response);
                alert('Thank you for taking the quiz!');
            } else {
                alert('Please select an answer.');
            }
        });
    </script>
</body>
</html>
